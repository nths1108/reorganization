<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文句重組大冒險</title>
    <style>
        :root {
            --game-blue: #29b6f6;
            --game-teal: #26a69a;
            --game-gold: #ffca28;
            --game-coral: #ef5350;
            --game-paper: #fff9c4;
            --ui-bg: rgba(255, 255, 255, 0.9);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background: #80cbc4; /* 遊戲底色 */
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            touch-action: none; 
        }

        /* 遊戲背景裝飾 */
        #bg-pattern {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#4db6ac 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: -1;
        }

        /* UI 頂部控制欄 */
        #game-header {
            position: absolute;
            top: 20px; left: 20px; right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        #lesson-title-display {
            font-size: 28px;
            font-weight: 900;
            color: #004d40;
            background: var(--ui-bg);
            padding: 10px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 3px solid #004d40;
        }

        .btn-group {
            display: flex; gap: 12px;
            pointer-events: auto;
        }

        button {
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 12px;
            border: none;
            background: #fff;
            color: #333;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 0 #ccc;
            transition: all 0.1s;
            display: flex; align-items: center; gap: 8px;
        }

        button:active { transform: translateY(4px); box-shadow: 0 0 0 #ccc; }
        button.primary { background: var(--game-gold); color: #5f4b00; box-shadow: 0 4px 0 #d4a017; }
        button.danger { background: var(--game-coral); color: white; box-shadow: 0 4px 0 #b71c1c; }

        /* 彈窗設計 */
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
            pointer-events: auto;
            border: 8px solid var(--game-teal);
        }

        #editor-modal { width: 90%; max-width: 850px; height: 85vh; flex-direction: row; }
        .modal-content { display: flex; width: 100%; height: 100%; gap: 25px; }
        
        .lesson-sidebar {
            width: 250px;
            border-right: 2px dashed #eee;
            padding-right: 15px;
            overflow-y: auto;
        }

        .lesson-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .sidebar-item {
            padding: 15px;
            background: #f1f8e9;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
        }
        .sidebar-item.active { border-color: var(--game-teal); background: #c8e6c9; color: #2e7d32; }

        input, textarea {
            width: 100%; padding: 12px; margin-top: 5px;
            border: 2px solid #ddd; border-radius: 10px; font-size: 16px;
            box-sizing: border-box;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; z-index: 900;
            backdrop-filter: blur(4px);
        }

        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: #333; color: #fff; padding: 15px 40px;
            border-radius: 50px; display: none; z-index: 2000; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="bg-pattern"></div>
<div id="game-header">
    <div id="lesson-title-display">文句重組大冒險</div>
    <div class="btn-group">
        <button class="primary" onclick="openEditor()">📝 課程管理</button>
        <button onclick="resetPositions()">🔄 重置方塊</button>
        <button class="danger" onclick="showConfirmReset()">💥 初始化</button>
    </div>
</div>

<div id="toast">訊息提示</div>
<div class="overlay" id="overlay" onclick="closeAllModals()"></div>

<!-- 課程管理彈窗 -->
<div id="editor-modal" class="modal">
    <div class="modal-content">
        <div class="lesson-sidebar">
            <h3 style="margin-top:0;">📚 我的課文庫</h3>
            <div id="lesson-list"></div>
            <button onclick="createNewLessonTemplate()" style="margin-top: 15px; width: 100%; background: var(--game-teal); color: white; box-shadow: 0 4px 0 #00796b;">+ 新增課次</button>
        </div>
        <div class="lesson-main">
            <h2 style="margin-top:0;">編輯課文內容</h2>
            <div style="flex: 1; overflow-y: auto; padding-right: 10px;">
                <label>📍 課文題目</label>
                <input type="text" id="input-title">
                <br><br>
                <label>🏷️ 上方標籤 (逗號隔開)</label>
                <input type="text" id="input-labels">
                <br><br>
                <label>💬 課文句子 (一行一句)</label>
                <textarea id="input-sentences"></textarea>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="primary" style="flex: 1;" onclick="saveLesson()">💾 儲存並開始挑戰</button>
                <button style="flex: 1;" onclick="closeEditor()">返回</button>
            </div>
        </div>
    </div>
</div>

<!-- 確認彈窗 -->
<div id="confirm-modal" class="modal" style="max-width: 350px; text-align: center;">
    <h2>確定要重置嗎？</h2>
    <p>這會清空所有的課次與進度喔！</p>
    <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button class="danger" style="flex:1" onclick="clearAllData()">確定清除</button>
        <button style="flex:1" onclick="closeAllModals()">先不要</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * 音效管理器
 */
const Sound = {
    ctx: null,
    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
    },
    play(type) {
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        const now = this.ctx.currentTime;

        switch(type) {
            case 'drag':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.05);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
                break;
            case 'snap':
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(500, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
                break;
            case 'click':
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
                break;
            case 'reset':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.4);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
                break;
        }
    }
};

const DEFAULT_LESSON = {
    id: "default-001",
    title: "朱自清《背影》",
    labels: ["背景", "發生", "發展", "結局"],
    sentences: [
        "我與父親不相見已二餘年了",
        "我最不能忘記的是他的背影",
        "那年冬天，祖母死了",
        "父親的差使也交卸了",
        "正是禍不單行的日子"
    ]
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let library = [];
let lesson = { ...DEFAULT_LESSON };
let currentLessonId = "";
let blocks = [];
let labels = [];
let particles = [];

let draggingBlock = null;
let offset = { x: 0, y: 0 };

function init() {
    const savedLib = localStorage.getItem('lesson_library_v2');
    if (savedLib) {
        library = JSON.parse(savedLib);
    } else {
        library = [DEFAULT_LESSON];
        saveLibrary();
    }

    const activeId = localStorage.getItem('active_lesson_id_v2');
    lesson = library.find(l => l.id === activeId) || library[0];
    currentLessonId = lesson.id;

    document.getElementById('lesson-title-display').innerText = lesson.title;
    
    resize();
    initElements();
    
    if (!window.animationRunning) {
        window.animationRunning = true;
        animate();
    }
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initLabels();
}

function initLabels() {
    labels = lesson.labels.map((text, i) => ({
        text,
        x: (canvas.width / (lesson.labels.length + 1)) * (i + 1),
        y: 180,
        w: 120,
        h: 50
    }));
}

function initElements() {
    const savedPos = localStorage.getItem(`pos_v2_${currentLessonId}`);
    const savedBlocks = savedPos ? JSON.parse(savedPos) : null;

    blocks = lesson.sentences.map((text, i) => {
        if (savedBlocks && savedBlocks[i] && savedBlocks[i].text === text) {
            return { ...savedBlocks[i], targetX: savedBlocks[i].x, targetY: savedBlocks[i].y, scale: 1 };
        }
        ctx.font = "bold 18px Sans-serif";
        const w = ctx.measureText(text).width + 60;
        const x = 100 + Math.random() * (canvas.width - 200);
        const y = canvas.height * 0.6 + Math.random() * (canvas.height * 0.3);
        return { text, x, y, targetX: x, targetY: y, w, h: 60, scale: 1, id: i };
    });
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1.0;
        this.color = color;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.life -= 0.02;
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 4, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function createBurst(x, y, color) {
    for(let i=0; i<15; i++) particles.push(new Particle(x, y, color));
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 繪製背景
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height * 0.45);

    // 繪製標籤
    labels.forEach(l => {
        ctx.fillStyle = "#00796b";
        roundRect(ctx, l.x - l.w/2, l.y - l.h/2 + 5, l.w, l.h, 15, true, false); 
        ctx.fillStyle = "#4db6ac";
        roundRect(ctx, l.x - l.w/2, l.y - l.h/2, l.w, l.h, 15, true, true);
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.font = "bold 20px Sans-serif";
        ctx.fillText(l.text, l.x, l.y + 8);
        
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = "rgba(0,0,0,0.1)";
        ctx.strokeRect(l.x - 50, l.y + 50, 100, 120);
        ctx.setLineDash([]);
    });

    // 繪製方塊
    blocks.forEach(b => {
        if (b !== draggingBlock) {
            b.x += (b.targetX - b.x) * 0.2;
            b.y += (b.targetY - b.y) * 0.2;
            b.scale += (1 - b.scale) * 0.2;
        } else {
            b.scale += (1.1 - b.scale) * 0.2;
        }

        const isDragging = (b === draggingBlock);
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.scale(b.scale, b.scale);

        ctx.shadowBlur = isDragging ? 15 : 6;
        ctx.shadowOffsetY = isDragging ? 8 : 2;
        ctx.shadowColor = "rgba(0,0,0,0.15)";
        
        let grad = ctx.createLinearGradient(-b.w/2, -b.h/2, b.w/2, b.h/2);
        grad.addColorStop(0, "#ffffff");
        grad.addColorStop(1, "#f5f5f5");
        ctx.fillStyle = grad;
        
        roundRect(ctx, -b.w/2, -b.h/2, b.w, b.h, 12, true, true);
        
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
        ctx.shadowColor = "transparent";

        ctx.strokeStyle = isDragging ? "#ffca28" : "#cfd8dc";
        ctx.lineWidth = isDragging ? 4 : 2;
        ctx.stroke();

        ctx.fillStyle = "#263238"; 
        ctx.textAlign = "center";
        ctx.font = "bold 18px Sans-serif";
        ctx.fillText(b.text, 0, 7);
        ctx.restore();
    });

    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => { p.update(); p.draw(); });

    requestAnimationFrame(animate);
}

function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
    ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
}

/**
 * 核心功能：重新整理所有標籤下的句子順序
 */
function reorganizeStacks() {
    labels.forEach(l => {
        // 找出所有目標座標落在這個標籤區域（上方半部且 X 座標一致）的方塊
        const atLabel = blocks.filter(b => b.targetX === l.x && b.targetY < canvas.height * 0.45);
        
        // 根據目前的 Y 座標排序，確保拖曳到中間時能正確插入
        atLabel.sort((a, b) => a.y - b.y);
        
        // 重新分配 targetY，每個間距 70 像素
        atLabel.forEach((b, index) => {
            b.targetX = l.x;
            b.targetY = l.y + 80 + (index * 70);
        });
    });
}

function getPointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
}

function handleStart(e) {
    const { x, y } = getPointerPos(e);
    for (let i = blocks.length - 1; i >= 0; i--) {
        const b = blocks[i];
        if (x > b.x - b.w/2 && x < b.x + b.w/2 && y > b.y - b.h/2 && y < b.y + b.h/2) {
            draggingBlock = b;
            offset.x = x - b.x;
            offset.y = y - b.y;
            blocks.splice(i, 1);
            blocks.push(draggingBlock); 
            Sound.play('drag');
            break;
        }
    }
}

function handleMove(e) {
    if (!draggingBlock) return;
    const { x, y } = getPointerPos(e);
    draggingBlock.x = x - offset.x;
    draggingBlock.y = y - offset.y;
    // 移動時同時更新 targetX/Y 讓動畫更即時
    draggingBlock.targetX = draggingBlock.x;
    draggingBlock.targetY = draggingBlock.y;
}

function handleEnd() {
    if (!draggingBlock) return;
    
    let isSnapped = false;
    
    // 檢查是否靠近任何標籤
    labels.forEach(l => {
        const isNearX = Math.abs(draggingBlock.x - l.x) < 70;
        const isNearY = draggingBlock.y < canvas.height * 0.45; // 在上方區域

        if (isNearX && isNearY) {
            // 先將 targetX 設為標籤中心，觸發 reorganizeStacks
            draggingBlock.targetX = l.x;
            isSnapped = true;
            Sound.play('snap');
        }
    });

    // 如果沒有吸附到任何標籤，且位於上方區域，可以考慮讓它自由停留或自動回到下方
    // 這裡我們維持 reorganize，如果沒吸附到標籤，其 targetX/Y 就維持放手的位置

    reorganizeStacks();
    draggingBlock = null;
    localStorage.setItem(`pos_v2_${currentLessonId}`, JSON.stringify(blocks));
}

function openEditor() {
    Sound.play('click');
    renderLessonList();
    loadLessonToFields(currentLessonId);
    document.getElementById('editor-modal').style.display = 'flex';
    document.getElementById('overlay').style.display = 'block';
}

function closeEditor() {
    Sound.play('click');
    document.getElementById('editor-modal').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
}

function renderLessonList() {
    const listDiv = document.getElementById('lesson-list');
    listDiv.innerHTML = "";
    library.forEach(l => {
        const item = document.createElement('div');
        item.className = `sidebar-item ${l.id === currentLessonId ? 'active' : ''}`;
        item.innerHTML = `<span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:160px;">${l.title}</span><span onclick="deleteLesson(event, '${l.id}')">🗑️</span>`;
        item.onclick = () => { Sound.play('click'); loadLessonToFields(l.id); };
        listDiv.appendChild(item);
    });
}

function loadLessonToFields(id) {
    const target = library.find(l => l.id === id);
    if (!target) return;
    currentLessonId = id;
    document.getElementById('input-title').value = target.title;
    document.getElementById('input-labels').value = target.labels.join(',');
    document.getElementById('input-sentences').value = target.sentences.join('\n');
    renderLessonList();
}

function createNewLessonTemplate() {
    Sound.play('click');
    const newId = 'L' + Date.now();
    library.push({ id: newId, title: "新課次名稱", labels: ["標籤1"], sentences: ["請輸入句子"] });
    currentLessonId = newId;
    saveLibrary();
    openEditor();
}

function saveLesson() {
    Sound.play('click');
    const idx = library.findIndex(l => l.id === currentLessonId);
    if (idx !== -1) {
        library[idx].title = document.getElementById('input-title').value.trim() || "未命名";
        library[idx].labels = document.getElementById('input-labels').value.split(/[，,]/).map(s=>s.trim()).filter(s=>s);
        library[idx].sentences = document.getElementById('input-sentences').value.split('\n').map(s=>s.trim()).filter(s=>s);
        saveLibrary();
        localStorage.setItem('active_lesson_id_v2', currentLessonId);
        localStorage.removeItem(`pos_v2_${currentLessonId}`);
        init();
        closeEditor();
        showToast("存檔成功，挑戰開始！");
    }
}

function deleteLesson(e, id) {
    e.stopPropagation();
    Sound.play('reset');
    if (library.length <= 1) return alert("至少要保留一個課次喔！");
    library = library.filter(l => l.id !== id);
    if (currentLessonId === id) currentLessonId = library[0].id;
    saveLibrary();
    renderLessonList();
}

function saveLibrary() { localStorage.setItem('lesson_library_v2', JSON.stringify(library)); }

function showToast(msg) {
    const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
}

function resetPositions() {
    Sound.play('reset');
    localStorage.removeItem(`pos_v2_${currentLessonId}`);
    initElements();
    showToast("方塊已重新排好");
}

function showConfirmReset() {
    Sound.play('click');
    document.getElementById('confirm-modal').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
}

function clearAllData() {
    Sound.play('reset');
    localStorage.clear();
    location.reload();
}

function closeAllModals() {
    document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    document.getElementById('overlay').style.display = 'none';
}

window.addEventListener('mousedown', handleStart);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);
window.addEventListener('touchstart', handleStart, { passive: false });
window.addEventListener('touchmove', handleMove, { passive: false });
window.addEventListener('touchend', handleEnd);
window.addEventListener('resize', resize);

init();
</script>
</body>
</html>

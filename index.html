<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文句重組大冒險</title>
    <style>
        :root {
            --primary-blue: #0277bd;
            --primary-dark: #01579b;
            --primary-light: #e1f5fe;
            --accent-gold: #ffb300;
            --danger-red: #e53935;
            --text-main: #263238;
            --bg-soft: #f8fbfe;
            --card-shadow: rgba(0, 0, 0, 0.08);
            --active-shadow: rgba(2, 119, 189, 0.25);
        }

        html, body { 
            width: 100%; height: 100%; 
            margin: 0; padding: 0; 
            overflow: hidden; 
            background: var(--bg-soft); 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            touch-action: none; 
        }

        canvas { 
            display: block; 
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh; 
            z-index: 5;
        }

        /* 背景裝飾 */
        #bg-pattern {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#d0d9e2 1.2px, transparent 1.2px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 1;
        }

        /* UI 頂部控制欄 */
        #game-header {
            position: absolute;
            top: 24px; left: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 10;
        }

        #lesson-title-display {
            font-size: clamp(18px, 2.5vw, 26px);
            font-weight: 800;
            color: var(--primary-dark);
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 32px;
            border-radius: 100px;
            box-shadow: 0 4px 20px var(--card-shadow);
            border: 2px solid var(--primary-blue);
            backdrop-filter: blur(10px);
        }

        .btn-group {
            display: flex; gap: 12px;
            pointer-events: auto;
        }

        button {
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.3);
            background: #fff;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 4px 12px var(--card-shadow);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 8px;
            white-space: nowrap;
        }

        button:active { transform: scale(0.95); box-shadow: 0 2px 6px var(--card-shadow); }
        button.primary { background: var(--primary-blue); color: white; border: none; }
        button.primary:hover { background: var(--primary-dark); }
        button.danger { color: var(--danger-red); border-color: #ffcdd2; }

        /* 模態視窗優化 */
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.15);
            z-index: 1000;
            display: none;
            pointer-events: auto;
            border: 1px solid #eee;
            width: 88vw; max-width: 950px; height: 82vh;
        }

        .modal-content { display: flex; width: 100%; height: 100%; gap: 32px; flex-direction: row; }
        .lesson-sidebar { width: 320px; border-right: 1px solid #eee; padding-right: 20px; overflow-y: auto; }
        .lesson-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .sidebar-item {
            padding: 16px;
            background: #f8f9fa;
            border-radius: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            font-weight: 600;
            color: #546e7a;
            transition: all 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .sidebar-item:hover { background: #eceff1; }
        .sidebar-item.active { border-color: var(--primary-blue); background: var(--primary-light); color: var(--primary-dark); }

        input, textarea { 
            width: 100%; padding: 14px; margin-top: 8px; border: 2px solid #e0e0e0; border-radius: 12px; 
            font-size: 16px; box-sizing: border-box; transition: border-color 0.2s;
        }
        input:focus, textarea:focus { border-color: var(--primary-blue); outline: none; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; z-index: 900; backdrop-filter: blur(8px); }
        #toast { position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%); background: var(--text-main); color: #fff; padding: 14px 40px; border-radius: 100px; display: none; z-index: 2000; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        @media (max-width: 768px) {
            .modal-content { flex-direction: column; }
            .lesson-sidebar { width: 100%; border-right: none; border-bottom: 1px solid #eee; height: 25%; padding-right: 0; margin-bottom: 16px; }
            #game-header { padding: 0 20px; top: 16px; }
        }
    </style>
</head>
<body>

<div id="bg-pattern"></div>
<div id="game-header">
    <div id="lesson-title-display">文句重組大冒險</div>
    <div class="btn-group">
        <button class="primary" onclick="openEditor()">📝 課程管理</button>
        <button onclick="resetPositions()">🔄 重置排列</button>
        <button class="danger" onclick="showConfirmReset()">💥 初始化</button>
    </div>
</div>

<div id="toast">訊息提示</div>
<div class="overlay" id="overlay" onclick="closeAllModals()"></div>

<!-- 課程管理彈窗 -->
<div id="editor-modal" class="modal">
    <div class="modal-content">
        <div class="lesson-sidebar">
            <h3 style="margin:0 0 16px 0; color: var(--primary-dark);">📚 我的課程庫</h3>
            <div id="lesson-list"></div>
            <button onclick="createNewLessonTemplate()" style="margin-top: 10px; width: 100%; background: var(--primary-blue); color: white; border:none; justify-content: center;">+ 新增課程</button>
        </div>
        <div class="lesson-main">
            <h2 style="margin:0 0 20px 0; color: var(--primary-dark);">內容設定</h2>
            <div style="flex: 1; overflow-y: auto; padding-right: 12px;">
                <label style="font-weight:700;">📍 課文題目</label>
                <input type="text" id="input-title" placeholder="例如：醉翁亭記">
                <br><br>
                <label style="font-weight:700;">🏷️ 上方標籤 (用逗號隔開)</label>
                <input type="text" id="input-labels" placeholder="例如：自然,活動,人情">
                <br><br>
                <label style="font-weight:700;">💬 課文句子 (一行一句)</label>
                <textarea id="input-sentences" placeholder="第一句...&#10;第二句..."></textarea>
            </div>
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button class="primary" style="flex: 1; justify-content: center;" onclick="saveLesson()">💾 儲存並挑戰</button>
                <button style="flex: 1; justify-content: center;" onclick="closeEditor()">返回遊戲</button>
            </div>
        </div>
    </div>
</div>

<!-- 初始化確認 -->
<div id="confirm-modal" class="modal" style="max-width: 400px; height: auto; text-align: center;">
    <h2 style="color:var(--danger-red);">確定要重置嗎？</h2>
    <p style="color:#607d8b; line-height: 1.6;">這會清空所有的自訂課次與排列進度，並恢復到預設範本喔！</p>
    <div style="display: flex; gap: 12px; margin-top: 32px;">
        <button class="danger" style="flex:1; justify-content: center;" onclick="clearAllData()">確定清除</button>
        <button style="flex:1; justify-content: center;" onclick="closeAllModals()">取消</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * 音效系統
 */
const Sound = {
    ctx: null,
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    play(type) {
        try {
            this.init();
            if (this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain); gain.connect(this.ctx.destination);
            const now = this.ctx.currentTime;
            osc.start(now);
            if (type === 'drag') {
                osc.frequency.setValueAtTime(550, now); gain.gain.setValueAtTime(0.04, now);
                osc.stop(now + 0.04);
            } else if (type === 'snap') {
                osc.frequency.setValueAtTime(880, now); gain.gain.setValueAtTime(0.08, now);
                osc.stop(now + 0.12);
            } else if (type === 'click') {
                osc.frequency.setValueAtTime(220, now); gain.gain.setValueAtTime(0.04, now);
                osc.stop(now + 0.08);
            } else if (type === 'reset') {
                osc.frequency.linearRampToValueAtTime(120, now + 0.3);
                osc.stop(now + 0.3);
            }
        } catch(e) {}
    }
};

const DEFAULT_LESSON = {
    id: "default-001",
    title: "歐陽脩《醉翁亭記》",
    labels: ["自然之美", "活動之美", "人情之美"],
    sentences: ["環滁皆山也。其西南諸峰，林壑尤美。", "醉翁之意不在酒，在乎山水之間也。", "太守與客來飲於此，飲少輒醉", "山水之樂，得之心而寓之酒也。"]
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let library = [], lesson = { ...DEFAULT_LESSON }, currentLessonId = "";
let blocks = [], labels = [], particles = [];
let draggingBlock = null, offset = { x: 0, y: 0 };
let dpr = window.devicePixelRatio || 1;

function init() {
    const savedLib = localStorage.getItem('lesson_library_v4');
    library = savedLib ? JSON.parse(savedLib) : [DEFAULT_LESSON];
    const activeId = localStorage.getItem('active_lesson_id_v4');
    lesson = library.find(l => l.id === activeId) || library[0];
    currentLessonId = lesson.id;
    document.getElementById('lesson-title-display').innerText = lesson.title;
    
    resize();
    initElements();
    if (!window.animationRunning) { window.animationRunning = true; animate(); }
}

function resize() {
    const width = window.innerWidth;
    const height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.scale(dpr, dpr);
    initLabels();
}

function initLabels() {
    const width = window.innerWidth;
    const count = lesson.labels.length;
    labels = lesson.labels.map((text, i) => ({
        text,
        x: (width / (count + 1)) * (i + 1),
        y: 200,
        w: Math.min(width * 0.22, 200),
        h: 64
    }));
}

function initElements() {
    const savedPos = localStorage.getItem(`pos_v4_${currentLessonId}`);
    const savedBlocks = savedPos ? JSON.parse(savedPos) : null;
    const width = window.innerWidth;
    const height = window.innerHeight;

    ctx.font = "bold 20px Sans-serif";

    blocks = lesson.sentences.map((text, i) => {
        if (savedBlocks && savedBlocks[i] && savedBlocks[i].text === text) {
            return { ...savedBlocks[i], targetX: savedBlocks[i].x, targetY: savedBlocks[i].y, scale: 1, lift: 0 };
        }
        
        const w = Math.min(ctx.measureText(text).width + 64, width * 0.85);
        const x = 120 + Math.random() * (width - 240);
        const y = height * 0.62 + Math.random() * (height * 0.22);
        return { text, x, y, targetX: x, targetY: y, w, h: 72, scale: 1, lift: 0, id: i };
    });
}

function animate() {
    const width = window.innerWidth;
    const height = window.innerHeight;
    ctx.clearRect(0, 0, width, height);

    // 上方放置區柔和背景
    ctx.fillStyle = "rgba(1, 87, 155, 0.03)";
    ctx.fillRect(0, 0, width, height * 0.5);

    // 繪製標籤 (精緻膠囊造型)
    labels.forEach(l => {
        // 陰影
        ctx.fillStyle = "rgba(1, 87, 155, 0.15)";
        roundRect(ctx, l.x - l.w/2, l.y - l.h/2 + 4, l.w, l.h, 32, true, false); 
        
        // 本體
        ctx.fillStyle = "#ffffff";
        roundRect(ctx, l.x - l.w/2, l.y - l.h/2, l.w, l.h, 32, true, false);
        
        // 邊框
        ctx.strokeStyle = "#01579b";
        ctx.lineWidth = 2.5;
        roundRect(ctx, l.x - l.w/2, l.y - l.h/2, l.w, l.h, 32, false, true);

        // 文字
        ctx.fillStyle = "#01579b"; ctx.textAlign = "center";
        ctx.font = `800 ${Math.max(16, width*0.02)}px Sans-serif`;
        ctx.fillText(l.text, l.x, l.y + 8);
        
        // 引導線框
        ctx.setLineDash([6, 6]); ctx.strokeStyle = "rgba(1, 87, 155, 0.12)";
        roundRect(ctx, l.x - 55, l.y + 70, 110, 160, 12, false, true);
        ctx.setLineDash([]);
    });

    // 繪製句子方塊
    blocks.forEach(b => {
        const isDragging = (b === draggingBlock);
        
        // 平滑動畫邏輯
        if (!isDragging) {
            b.x += (b.targetX - b.x) * 0.22; 
            b.y += (b.targetY - b.y) * 0.22;
            b.scale += (1 - b.scale) * 0.22;
            b.lift += (0 - b.lift) * 0.22;
        } else { 
            b.scale += (1.05 - b.scale) * 0.22; 
            b.lift += (12 - b.lift) * 0.22;
        }

        ctx.save();
        ctx.translate(b.x, b.y - b.lift); 
        ctx.scale(b.scale, b.scale);

        // 柔和陰影
        ctx.shadowBlur = isDragging ? 24 : 8;
        ctx.shadowOffsetY = isDragging ? 12 : 3;
        ctx.shadowColor = isDragging ? "rgba(1, 87, 155, 0.2)" : "rgba(0, 0, 0, 0.06)";
        
        // 卡片底色 (微漸層)
        const grad = ctx.createLinearGradient(0, -b.h/2, 0, b.h/2);
        grad.addColorStop(0, "#ffffff");
        grad.addColorStop(1, "#fcfdfe");
        ctx.fillStyle = grad;
        roundRect(ctx, -b.w/2, -b.h/2, b.w, b.h, 16, true, false);
        
        ctx.shadowBlur = 0; ctx.shadowOffsetY = 0; ctx.shadowColor = "transparent";
        
        // 卡片邊框
        ctx.strokeStyle = isDragging ? "#0277bd" : "#e0e7ee";
        ctx.lineWidth = isDragging ? 3 : 1.5; 
        roundRect(ctx, -b.w/2, -b.h/2, b.w, b.h, 16, false, true);
        
        // 裝飾小點
        ctx.fillStyle = isDragging ? "#0277bd" : "#cfd8dc";
        ctx.beginPath();
        ctx.arc(-b.w/2 + 15, 0, 3, 0, Math.PI*2);
        ctx.fill();

        // 文字內容
        ctx.fillStyle = "#263238"; ctx.textAlign = "center";
        ctx.font = `600 ${Math.max(17, width*0.019)}px Sans-serif`;
        ctx.fillText(b.text, 5, 8);
        ctx.restore();
    });

    // 粒子效果
    particles = particles.filter(p => (p.life -= 0.025) > 0);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    });

    requestAnimationFrame(animate);
}

function reorganizeStacks() {
    const height = window.innerHeight;
    labels.forEach(l => {
        const atLabel = blocks.filter(b => Math.abs(b.targetX - l.x) < 1 && b.targetY < height * 0.52);
        atLabel.sort((a, b) => a.y - b.y);
        atLabel.forEach((b, index) => {
            b.targetX = l.x;
            b.targetY = l.y + 110 + (index * 90);
        });
    });
}

function getPointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
}

function handleStart(e) {
    if (e.type === 'touchstart') e.preventDefault();
    const { x, y } = getPointerPos(e);
    for (let i = blocks.length - 1; i >= 0; i--) {
        const b = blocks[i];
        const hitMargin = 15;
        if (x > b.x - b.w/2 - hitMargin && x < b.x + b.w/2 + hitMargin && 
            y > b.y - b.h/2 - hitMargin && y < b.y + b.h/2 + hitMargin) {
            draggingBlock = b; offset.x = x - b.x; offset.y = y - b.y;
            blocks.splice(i, 1); blocks.push(draggingBlock);
            Sound.play('drag'); break;
        }
    }
}

function handleMove(e) {
    if (!draggingBlock) return;
    const { x, y } = getPointerPos(e);
    draggingBlock.x = x - offset.x; 
    draggingBlock.y = y - offset.y;
    draggingBlock.targetX = draggingBlock.x; 
    draggingBlock.targetY = draggingBlock.y;
}

function handleEnd() {
    if (!draggingBlock) return;
    const height = window.innerHeight;
    labels.forEach(l => {
        const dist = Math.sqrt((draggingBlock.x - l.x)**2 + (draggingBlock.y - (l.y + 110))**2);
        if (dist < 110 || (Math.abs(draggingBlock.x - l.x) < 90 && draggingBlock.y < height * 0.52)) {
            draggingBlock.targetX = l.x;
            for(let i=0; i<12; i++) particles.push({ 
                x: l.x, y: draggingBlock.y, 
                vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, 
                life: 1, color: "#039be5" 
            });
            Sound.play('snap');
        }
    });
    reorganizeStacks(); 
    draggingBlock = null;
    localStorage.setItem(`pos_v4_${currentLessonId}`, JSON.stringify(blocks));
}

function openEditor() { Sound.play('click'); renderLessonList(); loadLessonToFields(currentLessonId); document.getElementById('editor-modal').style.display = 'flex'; document.getElementById('overlay').style.display = 'block'; }
function closeEditor() { Sound.play('click'); document.getElementById('editor-modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }

function renderLessonList() {
    const listDiv = document.getElementById('lesson-list'); 
    listDiv.innerHTML = "";
    library.forEach(l => {
        const item = document.createElement('div');
        item.className = `sidebar-item ${l.id === currentLessonId ? 'active' : ''}`;
        item.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;">${l.title}</span><span onclick="deleteLesson(event, '${l.id}')">🗑️</span>`;
        item.onclick = () => { Sound.play('click'); loadLessonToFields(l.id); };
        listDiv.appendChild(item);
    });
}

function loadLessonToFields(id) {
    const target = library.find(l => l.id === id); 
    if (!target) return;
    currentLessonId = id; 
    document.getElementById('input-title').value = target.title;
    document.getElementById('input-labels').value = target.labels.join(',');
    document.getElementById('input-sentences').value = target.sentences.join('\n');
    renderLessonList();
}

function saveLesson() {
    const titleValue = document.getElementById('input-title').value.trim() || "未命名";
    const labelsValue = document.getElementById('input-labels').value.split(/[，,]/).map(s=>s.trim()).filter(s=>s);
    const sentencesValue = document.getElementById('input-sentences').value.split('\n').map(s=>s.trim()).filter(s=>s);
    if (sentencesValue.length === 0) return alert("請輸入句子！");

    const idx = library.findIndex(l => l.id === currentLessonId);
    if (idx !== -1) {
        library[idx].title = titleValue;
        library[idx].labels = labelsValue;
        library[idx].sentences = sentencesValue;
        localStorage.setItem('lesson_library_v4', JSON.stringify(library));
        localStorage.setItem('active_lesson_id_v4', currentLessonId);
        localStorage.removeItem(`pos_v4_${currentLessonId}`);
        init(); 
        closeEditor(); 
        showToast("課程內容已成功更新！");
    }
}

function createNewLessonTemplate() {
    const newId = 'L' + Date.now();
    library.push({ id: newId, title: "新課次名稱", labels: ["標籤"], sentences: ["請輸入句子"] });
    localStorage.setItem('lesson_library_v4', JSON.stringify(library));
    currentLessonId = newId;
    openEditor();
}

function deleteLesson(e, id) { 
    e.stopPropagation(); 
    if (library.length <= 1) return; 
    library = library.filter(l => l.id !== id); 
    if (currentLessonId === id) currentLessonId = library[0].id; 
    localStorage.setItem('lesson_library_v4', JSON.stringify(library)); 
    renderLessonList(); 
}

function resetPositions() { 
    Sound.play('reset'); 
    localStorage.removeItem(`pos_v4_${currentLessonId}`); 
    initElements(); 
    showToast("方塊排列已重置"); 
}

function showConfirmReset() { 
    document.getElementById('confirm-modal').style.display = 'block'; 
    document.getElementById('overlay').style.display = 'block'; 
}

function clearAllData() { localStorage.clear(); location.reload(); }
function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('overlay').style.display = 'none'; }
function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }

function roundRect(ctx, x, y, width, height, radius, fill, stroke) { 
    ctx.beginPath(); 
    ctx.moveTo(x + radius, y); 
    ctx.lineTo(x + width - radius, y); 
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius); 
    ctx.lineTo(x + width, y + height - radius); 
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); 
    ctx.lineTo(x + radius, y + height); 
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius); 
    ctx.lineTo(x, y + radius); 
    ctx.quadraticCurveTo(x, y, x + radius, y); 
    ctx.closePath(); 
    if (fill) ctx.fill(); 
    if (stroke) ctx.stroke(); 
}

window.addEventListener('mousedown', handleStart); 
window.addEventListener('mousemove', handleMove); 
window.addEventListener('mouseup', handleEnd);
window.addEventListener('touchstart', handleStart, { passive: false }); 
window.addEventListener('touchmove', handleMove, { passive: false }); 
window.addEventListener('touchend', handleEnd);
window.addEventListener('resize', () => { resize(); initElements(); });

init();
</script>
</body>
</html>

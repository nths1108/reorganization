<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文句重組大冒險</title>
    <style>
        :root {
            --game-blue: #01579b;
            --game-light-blue: #e3f2fd;
            --game-accent: #ffb300;
            --game-coral: #ef5350;
            --ui-bg: rgba(255, 255, 255, 0.95);
        }

        html, body { 
            width: 100%; height: 100%; 
            margin: 0; padding: 0; 
            overflow: hidden; 
            background: #f0f4f8; 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            touch-action: none; 
        }

        canvas { 
            display: block; 
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh; 
            background: #fff; 
            z-index: 5; /* 確保在背景上方 */
        }

        #bg-pattern {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#d1d9e6 1.5px, transparent 1.5px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }

        /* UI 頂部控制欄 */
        #game-header {
            position: absolute;
            top: 20px; left: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 10;
        }

        #lesson-title-display {
            font-size: clamp(18px, 3vw, 28px);
            font-weight: 900;
            color: var(--game-blue);
            background: var(--ui-bg);
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            border: 3px solid var(--game-blue);
            pointer-events: none;
        }

        .btn-group {
            display: flex; gap: 10px;
            pointer-events: auto;
        }

        button {
            padding: clamp(8px, 1.5vw, 15px) clamp(15px, 2.5vw, 25px);
            cursor: pointer;
            border-radius: 12px;
            border: none;
            background: #fff;
            color: #333;
            font-size: clamp(14px, 1.8vw, 18px);
            font-weight: bold;
            box-shadow: 0 4px 0 #cfd8dc;
            transition: all 0.1s;
            display: flex; align-items: center; gap: 8px;
            white-space: nowrap;
        }

        button:active { transform: translateY(4px); box-shadow: 0 0 0 #cfd8dc; }
        button.primary { background: var(--game-blue); color: white; box-shadow: 0 4px 0 #013b69; }
        button.danger { background: var(--game-coral); color: white; box-shadow: 0 4px 0 #b71c1c; }

        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 5vh;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            z-index: 1000;
            display: none;
            pointer-events: auto;
            border: 8px solid var(--game-blue);
            width: 85vw; max-width: 900px; height: 80vh;
        }

        .modal-content { display: flex; width: 100%; height: 100%; gap: 20px; flex-direction: row; }
        .lesson-sidebar { width: 30%; border-right: 2px dashed #eee; padding-right: 15px; overflow-y: auto; }
        .lesson-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .sidebar-item {
            padding: 12px;
            background: #f5f9ff;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            font-weight: bold;
            font-size: 14px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .sidebar-item.active { border-color: var(--game-blue); background: #e3f2fd; color: var(--game-blue); }

        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 900; backdrop-filter: blur(5px); }
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 15px 40px; border-radius: 50px; display: none; z-index: 2000; font-weight: bold; }

        @media (max-width: 600px) {
            .modal-content { flex-direction: column; }
            .lesson-sidebar { width: 100%; border-right: none; border-bottom: 2px dashed #eee; height: 30%; margin-bottom: 10px; }
            #game-header { padding: 0 10px; top: 10px; }
        }
    </style>
</head>
<body>

<div id="bg-pattern"></div>
<div id="game-header">
    <div id="lesson-title-display">載入中...</div>
    <div class="btn-group">
        <button class="primary" onclick="openEditor()">📝 管理</button>
        <button onclick="resetPositions()">🔄 重置</button>
        <button class="danger" onclick="showConfirmReset()">💥 初始化</button>
    </div>
</div>

<div id="toast">訊息提示</div>
<div class="overlay" id="overlay" onclick="closeAllModals()"></div>

<div id="editor-modal" class="modal">
    <div class="modal-content">
        <div class="lesson-sidebar">
            <h3 style="margin-top:0; color: var(--game-blue);">📚 課程庫</h3>
            <div id="lesson-list"></div>
            <button onclick="createNewLessonTemplate()" style="margin-top: 10px; width: 100%; background: var(--game-blue); color: white;">+ 新增課程</button>
        </div>
        <div class="lesson-main">
            <h2 style="margin-top:0; color: var(--game-blue);">編輯課文內容</h2>
            <div style="flex: 1; overflow-y: auto; padding-right: 10px;">
                <label>📍 題目</label><input type="text" id="input-title">
                <br><br>
                <label>🏷️ 標籤 (逗號隔開)</label><input type="text" id="input-labels">
                <br><br>
                <label>💬 句子 (一行一句)</label><textarea id="input-sentences"></textarea>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="primary" style="flex: 1;" onclick="saveLesson()">💾 儲存並挑戰</button>
                <button style="flex: 1;" onclick="closeEditor()">返回</button>
            </div>
        </div>
    </div>
</div>

<div id="confirm-modal" class="modal" style="max-width: 350px; height: auto; text-align: center;">
    <h2>確定要重置嗎？</h2>
    <p>這會清空所有的課次與進度喔！</p>
    <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button class="danger" style="flex:1" onclick="clearAllData()">確定清除</button>
        <button style="flex:1" onclick="closeAllModals()">先不要</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const Sound = {
    ctx: null,
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    play(type) {
        try {
            this.init();
            if (this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain); gain.connect(this.ctx.destination);
            const now = this.ctx.currentTime;
            osc.start(now);
            if (type === 'drag') {
                osc.frequency.setValueAtTime(600, now); gain.gain.setValueAtTime(0.05, now);
                osc.stop(now + 0.05);
            } else if (type === 'snap') {
                osc.frequency.setValueAtTime(800, now); gain.gain.setValueAtTime(0.1, now);
                osc.stop(now + 0.15);
            } else if (type === 'click') {
                osc.frequency.setValueAtTime(200, now); gain.gain.setValueAtTime(0.05, now);
                osc.stop(now + 0.1);
            } else if (type === 'reset') {
                osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                osc.stop(now + 0.3);
            }
        } catch(e) {}
    }
};

const DEFAULT_LESSON = {
    id: "default-001",
    title: "歐陽脩《醉翁亭記》",
    labels: ["自然之美", "活動之美", "人情之美"],
    sentences: ["環滁皆山也。其西南諸峰，林壑尤美。", "醉翁之意不在酒，在乎山水之間也。", "太守與客來飲於此，飲少輒醉", "山水之樂，得之心而寓之酒也。"]
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let library = [], lesson = { ...DEFAULT_LESSON }, currentLessonId = "";
let blocks = [], labels = [], particles = [];
let draggingBlock = null, offset = { x: 0, y: 0 };
let dpr = window.devicePixelRatio || 1;

function init() {
    const savedLib = localStorage.getItem('lesson_library_v3');
    library = savedLib ? JSON.parse(savedLib) : [DEFAULT_LESSON];
    const activeId = localStorage.getItem('active_lesson_id_v3');
    lesson = library.find(l => l.id === activeId) || library[0];
    currentLessonId = lesson.id;
    document.getElementById('lesson-title-display').innerText = lesson.title;
    
    resize();
    initElements();
    if (!window.animationRunning) { window.animationRunning = true; animate(); }
}

function resize() {
    const width = window.innerWidth;
    const height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.scale(dpr, dpr);
    initLabels();
}

function initLabels() {
    const width = window.innerWidth;
    const count = lesson.labels.length;
    labels = lesson.labels.map((text, i) => ({
        text,
        x: (width / (count + 1)) * (i + 1),
        y: 200,
        w: Math.min(width * 0.2, 180),
        h: 60
    }));
}

function initElements() {
    const savedPos = localStorage.getItem(`pos_v3_${currentLessonId}`);
    const savedBlocks = savedPos ? JSON.parse(savedPos) : null;
    const width = window.innerWidth;
    const height = window.innerHeight;

    blocks = lesson.sentences.map((text, i) => {
        if (savedBlocks && savedBlocks[i] && savedBlocks[i].text === text) {
            return { ...savedBlocks[i], targetX: savedBlocks[i].x, targetY: savedBlocks[i].y, scale: 1 };
        }
        ctx.font = "bold 20px Sans-serif";
        const w = Math.min(ctx.measureText(text).width + 60, width * 0.8);
        const x = 100 + Math.random() * (width - 200);
        const y = height * 0.6 + Math.random() * (height * 0.25);
        return { text, x, y, targetX: x, targetY: y, w, h: 70, scale: 1, id: i };
    });
}

function animate() {
    const width = window.innerWidth;
    const height = window.innerHeight;
    ctx.clearRect(0, 0, width, height);

    ctx.fillStyle = "rgba(1, 87, 155, 0.04)";
    ctx.fillRect(0, 0, width, height * 0.48);

    labels.forEach(l => {
        ctx.fillStyle = "#0d47a1";
        roundRect(ctx, l.x - l.w/2, l.y - l.h/2 + 5, l.w, l.h, 15, true, false); 
        ctx.fillStyle = "#e3f2fd";
        roundRect(ctx, l.x - l.w/2, l.y - l.h/2, l.w, l.h, 15, true, true);
        ctx.fillStyle = "#1565c0"; ctx.textAlign = "center";
        ctx.font = `bold ${Math.max(16, width*0.02)}px Sans-serif`;
        ctx.fillText(l.text, l.x, l.y + 8);
        
        ctx.setLineDash([5, 5]); ctx.strokeStyle = "rgba(1, 87, 155, 0.1)";
        ctx.strokeRect(l.x - 50, l.y + 60, 100, 150); ctx.setLineDash([]);
    });

    blocks.forEach(b => {
        if (b !== draggingBlock) {
            b.x += (b.targetX - b.x) * 0.2; b.y += (b.targetY - b.y) * 0.2;
            b.scale += (1 - b.scale) * 0.2;
        } else { b.scale += (1.08 - b.scale) * 0.2; }

        ctx.save();
        ctx.translate(b.x, b.y); ctx.scale(b.scale, b.scale);
        ctx.shadowBlur = b === draggingBlock ? 15 : 6;
        ctx.shadowOffsetY = b === draggingBlock ? 10 : 2;
        ctx.shadowColor = "rgba(0,0,0,0.1)";
        ctx.fillStyle = "#ffffff";
        roundRect(ctx, -b.w/2, -b.h/2, b.w, b.h, 15, true, true);
        
        ctx.shadowBlur = 0; ctx.shadowOffsetY = 0; ctx.shadowColor = "transparent";
        ctx.strokeStyle = b === draggingBlock ? "#ffb300" : "#d1d9e6";
        ctx.lineWidth = b === draggingBlock ? 4 : 2; ctx.stroke();
        
        ctx.fillStyle = "#263238"; ctx.textAlign = "center";
        ctx.font = `bold ${Math.max(16, width*0.018)}px Sans-serif`;
        ctx.fillText(b.text, 0, 8);
        ctx.restore();
    });

    particles = particles.filter(p => (p.life -= 0.02) > 0);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    });

    requestAnimationFrame(animate);
}

function reorganizeStacks() {
    labels.forEach(l => {
        const atLabel = blocks.filter(b => Math.abs(b.targetX - l.x) < 1 && b.targetY < window.innerHeight * 0.5);
        atLabel.sort((a, b) => a.y - b.y);
        atLabel.forEach((b, index) => {
            b.targetX = l.x;
            b.targetY = l.y + 100 + (index * 85);
        });
    });
}

function getPointerPos(e) {
    // 平板優化：使用 getBoundingClientRect 精確計算觸控座標
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { 
        x: clientX - rect.left, 
        y: clientY - rect.top 
    };
}

function handleStart(e) {
    const { x, y } = getPointerPos(e);
    for (let i = blocks.length - 1; i >= 0; i--) {
        const b = blocks[i];
        // 增加點擊容錯範圍 (+5px)
        if (x > b.x - b.w/2 - 5 && x < b.x + b.w/2 + 5 && y > b.y - b.h/2 - 5 && y < b.y + b.h/2 + 5) {
            draggingBlock = b; offset.x = x - b.x; offset.y = y - b.y;
            blocks.splice(i, 1); blocks.push(draggingBlock);
            Sound.play('drag'); break;
        }
    }
}

function handleMove(e) {
    if (!draggingBlock) return;
    const { x, y } = getPointerPos(e);
    draggingBlock.x = x - offset.x; draggingBlock.y = y - offset.y;
    draggingBlock.targetX = draggingBlock.x; draggingBlock.targetY = draggingBlock.y;
}

function handleEnd() {
    if (!draggingBlock) return;
    labels.forEach(l => {
        const dist = Math.sqrt((draggingBlock.x - l.x)**2 + (draggingBlock.y - (l.y + 100))**2);
        if (dist < 100 || (Math.abs(draggingBlock.x - l.x) < 80 && draggingBlock.y < window.innerHeight * 0.5)) {
            draggingBlock.targetX = l.x;
            for(let i=0; i<10; i++) particles.push({ x: l.x, y: draggingBlock.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color: "#1e88e5" });
            Sound.play('snap');
        }
    });
    reorganizeStacks(); draggingBlock = null;
    localStorage.setItem(`pos_v3_${currentLessonId}`, JSON.stringify(blocks));
}

function openEditor() { Sound.play('click'); renderLessonList(); loadLessonToFields(currentLessonId); document.getElementById('editor-modal').style.display = 'flex'; document.getElementById('overlay').style.display = 'block'; }
function closeEditor() { Sound.play('click'); document.getElementById('editor-modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
function renderLessonList() {
    const listDiv = document.getElementById('lesson-list'); listDiv.innerHTML = "";
    library.forEach(l => {
        const item = document.createElement('div');
        item.className = `sidebar-item ${l.id === currentLessonId ? 'active' : ''}`;
        item.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${l.title}</span><span onclick="deleteLesson(event, '${l.id}')">🗑️</span>`;
        item.onclick = () => { Sound.play('click'); loadLessonToFields(l.id); };
        listDiv.appendChild(item);
    });
}
function loadLessonToFields(id) {
    const target = library.find(l => l.id === id); if (!target) return;
    currentLessonId = id; document.getElementById('input-title').value = target.title;
    document.getElementById('input-labels').value = target.labels.join(',');
    document.getElementById('input-sentences').value = target.sentences.join('\n');
    renderLessonList();
}
function saveLesson() {
    const idx = library.findIndex(l => l.id === currentLessonId);
    if (idx !== -1) {
        library[idx].title = document.getElementById('input-title').value.trim();
        library[idx].labels = document.getElementById('input-labels').value.split(/[，,]/).map(s=>s.trim()).filter(s=>s);
        library[idx].sentences = document.getElementById('input-sentences').value.split('\n').map(s=>s.trim()).filter(s=>s);
        localStorage.setItem('lesson_library_v3', JSON.stringify(library));
        localStorage.setItem('active_lesson_id_v3', currentLessonId);
        localStorage.removeItem(`pos_v3_${currentLessonId}`);
        init(); closeEditor(); showToast("課程已更新！");
    }
}
function createNewLessonTemplate() {
    const newId = 'L' + Date.now();
    library.push({ id: newId, title: "新課次", labels: ["標籤"], sentences: ["新句子"] });
    currentLessonId = newId; localStorage.setItem('lesson_library_v3', JSON.stringify(library));
    openEditor();
}
function deleteLesson(e, id) { e.stopPropagation(); if (library.length <= 1) return; library = library.filter(l => l.id !== id); if (currentLessonId === id) currentLessonId = library[0].id; localStorage.setItem('lesson_library_v3', JSON.stringify(library)); renderLessonList(); }
function resetPositions() { Sound.play('reset'); localStorage.removeItem(`pos_v3_${currentLessonId}`); initElements(); showToast("位置已重置"); }
function showConfirmReset() { document.getElementById('confirm-modal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
function clearAllData() { localStorage.clear(); location.reload(); }
function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('overlay').style.display = 'none'; }
function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
function roundRect(ctx, x, y, width, height, radius, fill, stroke) { ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y); ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius); ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height); ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath(); if (fill) ctx.fill(); if (stroke) ctx.stroke(); }

window.addEventListener('mousedown', handleStart); window.addEventListener('mousemove', handleMove); window.addEventListener('mouseup', handleEnd);
window.addEventListener('touchstart', handleStart, { passive: false }); window.addEventListener('touchmove', handleMove, { passive: false }); window.addEventListener('touchend', handleEnd);
window.addEventListener('resize', () => { resize(); initElements(); });

init();
</script>
</body>
</html>
